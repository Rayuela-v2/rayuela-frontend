name: Sync main to personal fork

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sync-personal-fork
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout org repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main to personal fork
        env:
          TOKEN: ${{ secrets.PERSONAL_FORK_SYNC_TOKEN }}
        run: |
          if [ -z "${TOKEN}" ]; then
            echo "::error::PERSONAL_FORK_SYNC_TOKEN secret is empty or missing"
            exit 1
          fi
          echo "Token present (length: ${#TOKEN})"
          # actions/checkout injects a GITHUB_TOKEN credential helper that
          # overrides any other credentials for github.com — unset it first.
          git config --unset-all http.https://github.com/.extraheader || true
          git remote add personal "https://lucas-matw-unq:${TOKEN}@github.com/lucas-matw-unq/rayuela-frontend.git"
          # The fork is a one-way deploy mirror of org main — no development
          # happens there. Force the mirror to match org main exactly.
          # --force-with-lease still aborts if the fork changes mid-run.
          git fetch personal main
          git push --force-with-lease personal HEAD:refs/heads/main
